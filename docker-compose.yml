services:
  cloud2bim:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud2bim:latest
    container_name: cloud2bim
    ports:
      - "8001:8001"
    volumes:
      # Persistent storage for uploaded files and job outputs (IFC results)
      - cloud2bim_uploads:/app/web/uploads
      - cloud2bim_jobs:/app/web/jobs

      # ── Nätverksdiskar ────────────────────────────────────────────────────
      # Lägg till en rad per disk/mapp du vill exponera i webbgränssnittet.
      # Format:  /sökväg/på/hosten:/drives/Visningsnamn:ro
      # Mappnamnet efter /drives/ används som visningsnamn i filbläddraren.
      #
      # Exempel:
      # - /mnt/exNas01/projects:/drives/NAS_Projekt:ro
      # - /mnt/exNas01/scans:/drives/Skanningar:ro
      # - C:\PointClouds:/drives/Lokalt:ro   (Windows Docker Desktop)

    environment:
      PYTHONUNBUFFERED: "1"
      # Prevents Open3D from trying to initialise a GPU/display in headless mode
      OPEN3D_CPU_RENDERING: "true"
      MPLBACKEND: "Agg"

    restart: unless-stopped

volumes:
  cloud2bim_uploads:
  cloud2bim_jobs:
