<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud2BIM — 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1117; color: #e2e4f0; font-family: system-ui, sans-serif;
           height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    header { padding: 10px 16px; background: #1a1d27; border-bottom: 1px solid #2e3350;
             display: flex; align-items: center; gap: 12px; font-size: 13px; flex-shrink: 0; }
    header strong { color: #4f8ef7; }
    #wrap { flex: 1; position: relative; }
    canvas { width: 100% !important; height: 100% !important; display: block; }
    #overlay { position: absolute; inset: 0; display: flex; flex-direction: column;
               align-items: center; justify-content: center; gap: 12px;
               background: #0f1117; color: #7b82a0; font-size: 13px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #2e3350;
               border-top-color: #4f8ef7; border-radius: 50%;
               animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #legend { position: absolute; top: 12px; right: 12px; background: rgba(26,29,39,.88);
              border: 1px solid #2e3350; border-radius: 8px; padding: 10px 14px;
              font-size: 11px; display: flex; flex-direction: column; gap: 5px; backdrop-filter: blur(4px); }
    .leg { display: flex; align-items: center; gap: 7px; }
    .dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
    #stats { position: absolute; bottom: 12px; left: 12px; font-size: 11px;
             color: #4f5580; }
  </style>
</head>
<body>

<header>
  <strong>Cloud2BIM</strong>
  <span id="hdr">3D Viewer — extraherar geometri…</span>
</header>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay"><div class="spinner"></div><div id="status">Laddar…</div></div>
  <div id="legend" style="display:none">
    <div class="leg"><div class="dot" style="background:#7fa8cc"></div>Vägg</div>
    <div class="leg"><div class="dot" style="background:#8c8c9e"></div>Bjälklag</div>
    <div class="leg"><div class="dot" style="background:#8dd3ff"></div>Fönster</div>
    <div class="leg"><div class="dot" style="background:#c79e80"></div>Dörr</div>
    <div class="leg"><div class="dot" style="background:#a6a6a6"></div>Övrigt</div>
  </div>
  <div id="stats"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const params  = new URLSearchParams(location.search);
const jobId   = params.get('job');
const overlay = document.getElementById('overlay');
const status  = document.getElementById('status');
const wrap    = document.getElementById('wrap');

function setStatus(msg) { status.textContent = msg; }
function showError(msg) {
  overlay.innerHTML = `<div style="color:#e84855;text-align:center;padding:24px;max-width:400px">
    <div style="font-size:22px;margin-bottom:8px">⚠️</div><div>${msg}</div></div>`;
}

if (!jobId) { showError('Inget jobb-ID (?job=…)'); throw new Error(); }

// ── Three.js setup ─────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1117);
scene.fog = new THREE.FogExp2(0x0f1117, 0.008);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 5000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = false;

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(wrap);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfff8ee, 1.1);
sun.position.set(-15, 30, 20);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899dd, 0.35);
fill.position.set(10, -5, -15);
scene.add(fill);
scene.add(new THREE.HemisphereLight(0x4466aa, 0x224422, 0.3));

// Grid helper
const grid = new THREE.GridHelper(200, 40, 0x2e3350, 0x1f2236);
scene.add(grid);

// ── Load geometry from backend ─────────────────────────────────────────────
setStatus('Extraherar IFC-geometri på servern… (kan ta 10-30 s)');

let data;
try {
  const res = await fetch(`/api/jobs/${jobId}/geometry`);
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
  data = await res.json();
} catch(e) {
  showError('Kunde inte ladda geometri: ' + e.message);
  throw e;
}

setStatus('Bygger 3D-scen…');

// IFC uses Z-up; Three.js uses Y-up — rotate root group -90° around X
const root = new THREE.Group();
root.rotation.x = -Math.PI / 2;
scene.add(root);

let totalFaces = 0;

data.objects.forEach(obj => {
  if (!obj.v.length || !obj.f.length) return;

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(obj.v, 3));
  geom.setIndex(obj.f);
  geom.computeVertexNormals();

  const [r, g, b] = obj.c;
  const isWindow = obj.t === 'IfcWindow';
  const mat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(r, g, b),
    side: THREE.DoubleSide,
    shininess: isWindow ? 120 : 25,
    transparent: isWindow,
    opacity: isWindow ? 0.55 : 1.0,
    specular: isWindow ? new THREE.Color(0.6, 0.6, 0.6) : new THREE.Color(0.05, 0.05, 0.05),
  });

  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = !isWindow;
  mesh.receiveShadow = true;
  root.add(mesh);
  totalFaces += obj.f.length / 3;
});

// Fit camera to model (compute bbox in world space after rotation)
const bbox = new THREE.Box3().setFromObject(root);
if (!bbox.isEmpty()) {
  const center = bbox.getCenter(new THREE.Vector3());
  const size   = bbox.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist   = maxDim * 1.8;

  camera.position.set(center.x + dist * 0.6, center.y + dist * 0.5, center.z + dist);
  camera.near = dist * 0.001;
  camera.far  = dist * 10;
  camera.updateProjectionMatrix();
  controls.target.copy(center);
  controls.update();

  grid.position.y = bbox.min.y;
}

// Stats
document.getElementById('stats').textContent =
  `${data.objects.length} objekt · ${totalFaces.toLocaleString()} trianglar`;
document.getElementById('legend').style.display = 'flex';
document.getElementById('hdr').textContent = '3D Viewer — ' + data.objects.length + ' objekt';

// Hide overlay
overlay.style.display = 'none';

// Render loop
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
