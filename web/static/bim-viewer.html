<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud2BIM — IFC Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1117; color: #e2e4f0; font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    header { padding: 10px 16px; background: #1a1d27; border-bottom: 1px solid #2e3350; display: flex; align-items: center; gap: 10px; font-size: 13px; flex-shrink: 0; }
    header strong { color: #4f8ef7; }
    #canvas-wrap { flex: 1; position: relative; }
    #myCanvas { width: 100%; height: 100%; display: block; }
    #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #0f1117; color: #7b82a0; font-size: 13px; transition: opacity 0.3s; }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 32px; height: 32px; border: 3px solid #2e3350; border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { font-size: 12px; color: #4f8ef7; }
    #err { display: none; color: #e84855; text-align: center; padding: 16px; max-width: 400px; font-size: 12px; }
  </style>
</head>
<body>

<header>
  <strong>Cloud2BIM</strong> IFC Viewer
  <span id="hdr-status" style="color:#7b82a0;font-size:12px"></span>
</header>

<div id="canvas-wrap">
  <canvas id="myCanvas"></canvas>
  <div id="overlay">
    <div class="spinner"></div>
    <div id="status">Initierar web-ifc…</div>
    <div id="err"></div>
  </div>
</div>

<script type="module">
const params = new URLSearchParams(location.search);
const jobId  = params.get('job');

const overlay  = document.getElementById('overlay');
const statusEl = document.getElementById('status');
const errEl    = document.getElementById('err');
const hdrEl    = document.getElementById('hdr-status');

function setStatus(msg) { statusEl.textContent = msg; }
function showError(msg) {
  errEl.style.display = 'block';
  errEl.textContent   = '⚠ ' + msg;
  statusEl.textContent = '';
}

if (!jobId) { showError('Inget jobb-ID (?job=…)'); }

// ── Load web-ifc via dynamic import (it's an ES module) ──────────────────
setStatus('Laddar web-ifc…');
let WebIFC;
try {
  const mod = await import('/static/bimviewer/libs/web-ifc/web-ifc-api.js');
  console.log('[viewer] web-ifc total keys:', Object.keys(mod).length);
  console.log('[viewer] web-ifc first 12 keys:', Object.keys(mod).slice(0, 12));
  console.log('[viewer] has IfcAPI:', 'IfcAPI' in mod, typeof mod.IfcAPI);
  console.log('[viewer] default type:', typeof mod.default);
  console.log('[viewer] default.IfcAPI:', typeof mod.default?.IfcAPI);

  if (!mod.IfcAPI) {
    showError('IfcAPI saknas i web-ifc-api.js. Keys: ' + Object.keys(mod).slice(0, 8).join(', '));
    throw new Error('no IfcAPI');
  }
  // Wrap in a plain object — xeokit's property check fails on ES module namespaces
  WebIFC = { IfcAPI: mod.IfcAPI };
  console.log('[viewer] WebIFC.IfcAPI:', typeof WebIFC.IfcAPI);
} catch(e) {
  if (!errEl.style.display || errEl.style.display === 'none') showError('web-ifc import: ' + e.message);
  throw e;
}

// ── Load xeokit-sdk ───────────────────────────────────────────────────────
setStatus('Laddar xeokit…');
let xeokit;
try {
  xeokit = await import('/static/bimviewer/dist/xeokit-sdk.es.js');
} catch(e) { showError('xeokit: ' + e.message); throw e; }

const { Viewer, WebIFCLoaderPlugin, AmbientLight, DirLight } = xeokit;

// Debug: see what IFC-related names xeokit actually exports
const ifcExports = Object.keys(xeokit).filter(k => /ifc/i.test(k));
console.log('[viewer] xeokit IFC exports:', ifcExports);
console.log('[viewer] WebIFCLoaderPlugin type:', typeof WebIFCLoaderPlugin);

// ── Create viewer ─────────────────────────────────────────────────────────
const viewer = new Viewer({ canvasId: 'myCanvas', transparent: true });
viewer.camera.eye  = [10, 10, 10];
viewer.camera.look = [0, 0, 0];
viewer.camera.up   = [0, 1, 0];
new AmbientLight(viewer.scene, { color: [1,1,1], intensity: 0.4 });
new DirLight(viewer.scene, { dir: [-0.5,-0.8,-0.4], color: [1,1,0.95], intensity: 0.7, space: 'world' });
new DirLight(viewer.scene, { dir: [0.5,0.2,0.8],   color: [0.8,0.9,1], intensity: 0.3, space: 'world' });

// ── Create IFC loader — try three variants ────────────────────────────────
let ifcLoader;
const WASM = '/static/bimviewer/libs/web-ifc/';
const attempts = [
  // 1. Plain object wrapper (current approach)
  () => new WebIFCLoaderPlugin(viewer, { WebIFC, wasmPath: WASM }),
  // 2. Full module namespace directly
  () => new WebIFCLoaderPlugin(viewer, { WebIFC: (async()=>await import('/static/bimviewer/libs/web-ifc/web-ifc-api.js'))(), wasmPath: WASM }),
  // 3. No WebIFC — use xeokit's internal asm.js
  () => new WebIFCLoaderPlugin(viewer, { wasmPath: WASM }),
];

for (let i = 0; i < attempts.length; i++) {
  try {
    ifcLoader = await attempts[i]();
    console.log('[viewer] Loader OK with attempt', i + 1);
    break;
  } catch(e) {
    console.warn(`[viewer] Attempt ${i+1} failed:`, e);
    if (i === attempts.length - 1) {
      showError('WebIFCLoaderPlugin (alla försök misslyckades): ' + (e.message || e));
      throw e;
    }
  }
}

// ── Load model ────────────────────────────────────────────────────────────
setStatus('Laddar IFC-modell…');
const model = ifcLoader.load({
  id: 'model',
  src: '/api/jobs/' + jobId + '/download',
  edges: true,
});

model.on('loaded', () => {
  overlay.classList.add('hidden');
  viewer.cameraFlight.flyTo(model);
  hdrEl.textContent = '— modell laddad';
});

model.on('error', err => showError('IFC: ' + err));
</script>
</body>
</html>
